    <!--Konten Kontak-->
    <main class="container my-5">
        <h2>Kontak Kami</h2>
        <form>
            <div class="form-group">
                <label for="name">Nama</label>
                <input type="text" class="form-control" id="name" placeholder="Nama Anda">
            </div>
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" class="form-control" id="email" placeholder="Email Anda">
            </div>
            <div class="form-group">
                <label for="messege">Pesan</label>
                <textarea class="form-control" rows="3" id="messege" placeholder="Pesan Anda"></textarea>
            </div>
            <div class="form-group">
                <label for="keluhan">Keluhan</label>
                <textarea type="text" class="form-control" rows="4" id="keluhan" placeholder="Sampaikan keluhan anda"></textarea>
            </div>
            <button type="submit" class="btn btn-primary mt-1">Kirim</button>
        </form>
    </main>
