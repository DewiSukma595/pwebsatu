<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB Alumni UNIKU</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1{
            color: darkgreen;
        }
        #hoverProfile{
            width: 150px;
            height: 150px;
            background-color: lightgray;
            margin: 20px 0;
            text-align: center;
            line-height: 150px;
            transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
            border: 1px solid #ccc;
            overflow: hidden;
        }
        #hoverProfile img{
            max-width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s, filter 0.3s;
        }
        #output{
            margin-top: 20px;
            color: darkgreen;
        }
        #windowSize{
            margin-top: 20px;
            color: blue;
        }
        form{
            margin-top: 20px;
        }
        label{
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="file"] {
            width: 200%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button{
            padding: 10px 15px;
            background-color: darkgreen;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover{
            background-color: green;
        }
        table{
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        table, th, td{
            border: 1px solid #ddd;
        }
        th, td{
            padding: 10px;
            text-align: left;
        }
        th{
            background-color: #f2f2f2;
        }
        td img{
            width: 100px;
            height: 100px;
            object-fit: cover;
            transition: all 0.3s ease-in-out;
        }
        .action-buttons button{
            margin: 0.5px;
            padding: 5px 10px;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .action-buttons button.delete{
            background-color: #f44336;
        }
        .action-buttons button:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>WEB Alumni UNIKU</h1>

    <!--Event Mouse-->
    <button id="contactButton">Hubungi Alumni</button>
    <div id="hoverProfile">
        <img src="img/alumni1.jpeg" alt="Profile Alumni 1">
    </div>

    <!--Event Keyboard-->
    <input type="text" id="searchAlumni" placeholder="Cari Alumni">

    <!--Event Form-->
    <form id="alumniForm">
        <label for="name">Nama Alumni:</label>
        <input type="text" name="name" id="name" placeholder="Masukkan nama alumni..">
        <label for="year">Tahun Kelulusan:</label>
        <input type="text" name="year" id="year" placeholder="Masukkan tahun kelulusan..">

        <label for="photo">Photo Alumni:</label>
        <input type="file" name="photo" id="photo" accept="image/*">

        <button type="submit">Tambahkan Alumni</button>
    </form>

    <!--Tabel Data Alumni-->
    <table id="alumniTable">
        <thead>
            <tr>
                <th>Nama Alumni</th>
                <th>Tahun Kelulusan</th>
                <th>Photo</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <!--Data Alumni akan Ditambahkan di Sini-->
        </tbody>
    </table>

    <!--Event Document/Window-->
    <p id="windowSize">Ukuran Jendela:</p>

    <!--Output untuk Event Kustom-->
    <p id="output"></p>

    <script src="jQuery/jquery-3.7.1.min.js"></script>
    <script src="script3.js"></script>
</body>
</html>
